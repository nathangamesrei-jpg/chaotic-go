<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chaotic GO - Login</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="logo.png" alt="Logotipo Chaotic GO Pequeno" id="logo-login">

    <div class="caixa-botoes">
        <button class="botao-padrao" id="btn-abrir-login">Fazer Login</button>
        <button class="botao-padrao" id="btn-abrir-cadastro">Criar Conta</button>
        <button class="botao-admin">Painel Admin</button>
    </div>

    <div id="modal-login" class="modal-oculto">
        <div class="modal-conteudo">
            <h2>Acessar Scanner</h2>
            
            <input type="text" id="usuario" placeholder="Nome de Usuário">
            <input type="password" id="senha" placeholder="Senha">
            
            <button class="botao-padrao" id="btn-entrar">Entrar</button>
            <button class="botao-voltar" id="btn-fechar-login">Voltar</button>
        </div>
    </div>

    <div id="modal-cadastro" class="modal-oculto">
        <div class="modal-conteudo">
            <h2>Nova Conta</h2>
            
            <input type="email" id="novo-email" placeholder="Seu E-mail">
            <input type="text" id="novo-usuario" placeholder="Nome de Usuário">
            <input type="password" id="nova-senha" placeholder="Crie uma Senha">
            
            <button class="botao-padrao" id="btn-cadastrar">Cadastrar</button>
            <button class="botao-voltar" id="btn-fechar-cadastro">Voltar</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
